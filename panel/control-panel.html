<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a1628" />
  <title>Control Panel — AmmoOS</title>
  <link rel="icon" href="/assets/queen-favicon-48.png" type="image/png" sizes="48x48" />
  <link rel="stylesheet" href="/assets/control-panel.css?v=cp1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://127.0.0.1:*; object-src 'none'; base-uri 'self'" />
</head>
<body>
  <div class="cp-root">
    <aside class="cp-nav" aria-label="Control Panel sections">
      <header class="cp-brand">
        <img src="/assets/queen-prog-os.png" alt="" width="32" height="32" />
        <div>
          <h1>Control Panel</h1>
          <p>AmmoOS · Display &amp; audio</p>
        </div>
      </header>
      <nav>
        <button type="button" class="active" data-cp-tab="display">Display</button>
        <button type="button" data-cp-tab="theme">Appearance &amp; Theme</button>
        <button type="button" data-cp-tab="hardware">Hardware</button>
        <button type="button" data-cp-tab="system">System</button>
        <button type="button" data-cp-tab="personalize">Personalization</button>
        <button type="button" data-cp-tab="programs">Programs</button>
      </nav>
    </aside>
    <main class="cp-main" id="cp-main" aria-live="polite">
      <p class="cp-loading">Loading…</p>
    </main>
  </div>
  <script src="/assets/control-panel.js?v=cp1" defer></script>

</html>
