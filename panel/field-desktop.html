<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="color-scheme" content="dark" />
  <title>AmmoOS C2 Desktop</title>
  <meta name="description" content="AmmoOS C2 — category Start folders, monitor wall, sovereign field programs." />
  <link rel="icon" href="/assets/queen-favicon-48.png" type="image/png" sizes="48x48" />
  <link rel="stylesheet" href="/assets/field-host-desktop.css?v=hd6" />
  <link rel="stylesheet" href="/assets/field-monitor-dashboard.css?v=1" />
  <link rel="stylesheet" href="/assets/field-startbar.css?v=hd7" />
  <link rel="stylesheet" href="/assets/nexus-field-shell.css?v=hd5" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http://127.0.0.1:* https://127.0.0.1:*; object-src 'none'; base-uri 'self'" />
  <script>
    (function () {
      var root = document.documentElement;
      root.classList.add("nfs-fullscreen-desktop", "nfs-kiosk");
      function go() {
        try {
          if (!document.fullscreenElement && root.requestFullscreen) {
            root.requestFullscreen({ navigationUI: "hide" }).catch(function () {});
          }
        } catch (_) {}
      }
      go();
      document.addEventListener("DOMContentLoaded", go);
      document.addEventListener("pointerdown", go, { once: true });
    })();
  </script>
  <style>
    #hd-toast {
      position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%);
      padding: 10px 18px; border-radius: 8px; background: rgba(20, 24, 36, 0.95);
      border: 1px solid rgba(255,255,255,0.12); color: #eef4ff; font-size: 13px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 9200;
    }
    #hd-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="hd-shell" id="hd-shell">
    <div class="hd-desktop" id="hd-desktop" role="main" aria-label="AmmoOS desktop">
      <div class="hd-loading" id="hd-loading">Loading AmmoOS…</div>
      <div class="hd-wall-label" id="hd-wall-label">AmmoOS</div>
      <div class="hd-icons" id="hd-icons" aria-label="Desktop programs"></div>
    </div>
    <aside class="hd-monitor" id="hd-monitor" aria-label="Monitor dashboard"></aside>
  </div>
  <div id="fsb-mount" aria-live="polite"></div>
  <div id="hd-toast" role="status" aria-live="polite"></div>
  <script src="/assets/queen-icon-engine.js?v=1" defer></script>
  <script src="/assets/field-queen-nav.js?v=hd5" defer></script>
  <script src="/assets/nexus-field-shell.js?v=hd7" defer></script>
  <script src="/assets/field-startbar.js?v=hd7" defer></script>
  <script src="/assets/field-monitor-dashboard.js?v=1" defer></script>
  <script src="/assets/field-host-desktop.js?v=hd7" defer></script>
</body>
</html>
