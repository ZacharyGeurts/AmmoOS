<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="color-scheme" content="dark" />
  <title>Field Desktop — NEXUS Host</title>
  <meta name="description" content="Your programs, your OS menu, field startbar overlay." />
  <link rel="stylesheet" href="/assets/field-host-desktop.css?v=hd1" />
  <link rel="stylesheet" href="/assets/field-startbar.css?v=hd1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http://127.0.0.1:* https://127.0.0.1:*; object-src 'none'; base-uri 'self'" />
  <style>
    #hd-toast {
      position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%);
      padding: 10px 18px; border-radius: 8px; background: rgba(20, 24, 36, 0.95);
      border: 1px solid rgba(255,255,255,0.12); color: #eef4ff; font-size: 13px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 9200;
    }
    #hd-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="hd-desktop" id="hd-desktop" role="main" aria-label="Host desktop">
    <div class="hd-loading" id="hd-loading">Loading your programs…</div>
    <div class="hd-wall-label" id="hd-wall-label">Host desktop</div>
    <div class="hd-icons" id="hd-icons" aria-label="Desktop programs"></div>
  </div>
  <div id="fsb-mount" aria-live="polite"></div>
  <div id="hd-toast" role="status" aria-live="polite"></div>
  <script src="/assets/field-startbar.js?v=hd1" defer></script>
  <script src="/assets/field-host-desktop.js?v=hd1" defer></script>
</body>
</html>
