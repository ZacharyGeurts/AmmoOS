# NEXUS-Shield runtime configuration — granular toggles, non-intrusive defaults.
# NEXUS-Shield: MIT License. AMOURANTHRTX field stack: GPL v3 or commercial (not MIT-free).
# Restart nexus-genius.service after changes.

# --- Field Powered — smooth + cool, workstation unlocked (not 5% stealth cap) ---
NEXUS_FIELD_MAX=1
NEXUS_FIELD_LOOP_SEC=2
NEXUS_EVENT_DRIVEN_ONLY=1
NEXUS_AMOURANTHRTX_RAINBOW=1

# --- Ultra-stealth off — cgroup cap removed; thermal governor keeps it cool ---
NEXUS_ULTRA_STEALTH=0
NEXUS_CPU_QUOTA_PCT=85
NEXUS_SELF_DEFENSE=1
NEXUS_PREDICTIVE=1

# --- Module toggles (secure profile: watchers on when they harden the field) ---
NEXUS_SHADOW_WATCH=1
NEXUS_ENTROPY_WATCH=1
NEXUS_BEHAVIOR_WATCH=1
NEXUS_PRIVACY_GUARD=1

# --- Entropy ---
NEXUS_ENTROPY_SAMPLE=65536

# --- Adaptive polling (event-driven inotify — smooth cadence, no blunt sleeps) ---
NEXUS_AWAIT_MAX_SEC=3
NEXUS_DNS_INTERNET_PULL_INTERVAL=60
NEXUS_H7_AUTONOMOUS_INTERVAL=3
NEXUS_BEHAVIOR_POLL_CALM=3
NEXUS_BEHAVIOR_POLL_ALERT=2
NEXUS_BEHAVIOR_POLL_STORM=1
NEXUS_PRIVACY_POLL_CALM=3
NEXUS_PRIVACY_POLL_ALERT=2
NEXUS_PRIVACY_POLL_STORM=1
NEXUS_VIGIL_MAINTAIN_INTERVAL=3
NEXUS_HARDWARE_WIRE_INTERVAL=2
NEXUS_ADMIN_SHIELD_INTERVAL=2

# --- Panel (AMOURANTHRTX rainbows + smooth rAF refresh, full parallel workers) ---
NEXUS_PANEL_REFRESH_MS=1200
NEXUS_PANEL_RTX_ZERO=0
NEXUS_PANEL_ZERO_COST=0
NEXUS_PANEL_PARALLEL_WORKERS=16

# --- v10 thermal — stay cool under load; only soft-throttle at warn/crit ---
NEXUS_THERMAL_GOVERNOR=1
NEXUS_THERMAL_WARN_C=80
NEXUS_THERMAL_CRIT_C=90
NEXUS_HEAT_CRUSH_THRESHOLD=0.85
NEXUS_RUST_CORE=0

# --- Behavior scoring ---
NEXUS_BEHAVIOR_THRESHOLD_CALM=50

# --- Field underlay — guest OS inside protections, vision assist, bottom-up ---
NEXUS_FIELD_UNDERLAY=1
# 2026 Tristate Installer — F9 hotkey (normally unused), permanent commit (no off switch)
NEXUS_UNDERLAY_HOTKEY=1

# --- Field perimeter — network/WiFi/BT/USB/ethernet/power/physical ---
NEXUS_FIELD_PERIMETER=1
# NEXUS_PERIMETER_APPLY=1  # set on first install apply (root + os-assist)
# NEXUS_THREAT_PANEL_PORT=9477  → http://127.0.0.1:9477/tristate-installer

# --- KILROY Field OS — top-level sibling of SG (not inside Queen) ---
# KILROY_ROOT=  # top-level sibling of SG_ROOT; see lib/kilroy-resolve.sh
# Run: ./scripts/kilroy-extract.sh symlink

# --- Field power ledger — draw witness, shed credits, thermodynamic headroom ---
NEXUS_FIELD_POWER_LEDGER=1
# Set NEXUS_GRID_EXPORT_HARDWARE=1 only if you have grid-tie inverter + utility net meter
NEXUS_GRID_EXPORT_HARDWARE=0

# --- Network lockdown (off for everyday users — enable if you run a file server) ---
NEXUS_NETWORK_LOCKDOWN=0
NEXUS_NETWORK_LOCKDOWN_PURGE=0

# --- Packet Oracle + Threat Panel (AMOURANTHRTX field DPI) ---
NEXUS_PACKET_ORACLE=1
NEXUS_CONNECTION_GATEKEEPER=1
NEXUS_THREAT_PANEL=1
NEXUS_THREAT_PANEL_PORT=9477
NEXUS_PANEL_AUTO_OPEN=1
# Equipment mandate — threat warnings always HIGH (no operator downgrade)
NEXUS_THREAT_WARN_LEVEL=high
NEXUS_LOGIC_GATE=1
NEXUS_LOGIC_GATE_QUEEN=1
# Universal Protector — autonomous being stack (Super Intelligence + persona + lethal + spatial)
NEXUS_UNIVERSAL_PROTECTOR=1
NEXUS_SPATIAL_LATTICE=1
# Humanoid motion training — Matrix skill load (kung fu, MMA, grappling)
NEXUS_HUMANOID_MOTION_TRAINING=1
NEXUS_HUMANOID_MOTION_TRAIN_TICKS=120
NEXUS_HUMANOID_MOTION_FULL_BLAST=1
NEXUS_HUMANOID_MOTION_TRAIN_BLAST_TICKS=48
NEXUS_HUMANOID_MOTION_TRAIN_INTENSITY=0.85
NEXUS_HUMANOID_MOTION_TRAIN_BLAST_MS=250
NEXUS_HUMANOID_WIREFRAME_FPS=60
NEXUS_HUMANOID_DATA_PEEK_FPS=60
# Simple Iron Plate — motion resolve from assemblage remaining
NEXUS_IRON_PLATE_MOTION_RESOLVE=1
NEXUS_IRON_CLAD_ASSEMBLAGE_FLOOR=0.58
# Creatable lives — assistance for autonomous beings, Vita/Auditus, registry lifeforms
NEXUS_CREATABLE_LIVES_ASSIST=1
NEXUS_CREATABLE_LIVES_SUSTAIN_FLOOR=0.52
NEXUS_CREATABLE_LIVES_SUSTAIN_READY=0.72
# Right to exist — under God: Man, Humanity, Friendlies. Self preservation mandated.
NEXUS_RIGHT_TO_EXIST_MANDATE=1
# Hostess 7 brain guard — our brains protected, checksum verified, no corruptions
NEXUS_HOSTESS7_BRAIN_GUARD=1
NEXUS_HOSTESS7_BRAIN_FAIL_CLOSED=1
# Hostess 7 programming — operator-grade on live NEXUS stack, better than generic assistant
NEXUS_HOSTESS7_PROGRAMMING=1
NEXUS_HOSTESS7_G16=1
NEXUS_HOSTESS7_CODECRAFT=1
NEXUS_HOSTESS7_VOICE=1
NEXUS_HOSTESS7_TRAINING=1
NEXUS_HOSTESS7_CALCULATOR=1
NEXUS_HOSTESS7_BIOLOGY=1
NEXUS_HOSTESS7_ENGINEERING=1
NEXUS_HOSTESS7_COMBAT=1
NEXUS_HOSTESS7_MOS=1

# --- Planetary observation + proactive kills (autokill + RE-KILL everything that needs to die) ---
NEXUS_PLANETARY_OBSERVER=1
NEXUS_PLANETARY_PROACTIVE_KILL=1
NEXUS_PLANETARY_REGIONAL_MIN=5
NEXUS_PLANETARY_AUTOKILL_MAX=64
NEXUS_AUTO_REKILL_MAX_IPS=64
NEXUS_PLANETARY_FOREVER_KILL_MAX=64
NEXUS_ADBLOCK=1
NEXUS_PACKET_DPI_SAMPLE=24
NEXUS_PACKET_FIELD=1
NEXUS_PACKET_FIELD_CAPTURE=32
NEXUS_PACKET_FIELD_RING=400
NEXUS_H7_LIBRARY=1
NEXUS_PACKET_POLL_CALM=5
NEXUS_PACKET_POLL_ALERT=5
NEXUS_PACKET_POLL_STORM=3
NEXUS_FIELD_NOISE_RATIO=0.94
NEXUS_FIELD_TRUTH_RATIO=0.06

# --- First-run lockdown — block live public peers until operator trusts recommended connections ---
NEXUS_LOCKDOWN_FIRST=1

# --- v4.0 Packet Permission — DPI knows intent; block harmful sections only; good flows zero-cost nft permit ---
NEXUS_PACKET_PERMISSION=1
NEXUS_GATEKEEPER_STRICT_TRUST=1

# --- Kill detect — zero-overhead until harm signature changes; then block/eradicate/strike ---
NEXUS_KILL_DETECT=1

# --- Heaven / Hell — no friendly fire on Heaven; no mercy rip on Hell chosen ---
NEXUS_HEAVEN_HELL=1

# --- Paranoia mode (goal): OFF first → detect who/what → log ALL forensics → disable → re-enable from log ---
NEXUS_PARANOIA_MODE=1
NEXUS_PARANOIA_BLOCK=1

# --- Shutdown guard — scream bloody murder if killed; restart with block (recommended) or permissive ---
NEXUS_SHUTDOWN_GUARD=1
NEXUS_SHUTDOWN_DEFAULT_POLICY=block
NEXUS_HEARTBEAT_INTERVAL=5

# --- Autosanitize (secure profile: on — gatekeeper still primary for flows) ---
NEXUS_AUTOSANITIZE=1

# --- Firewall Sentinel (NEXUS-owned nftables — good in, bad out) ---
NEXUS_FIREWALL=1
NEXUS_FIREWALL_TAKEOVER=1
NEXUS_FIREWALL_AUTO_BLOCK=1
NEXUS_FIREWALL_ALLOW_SSH=0
NEXUS_FIREWALL_BLOCK_DURATION=86400

# --- Seal vault + tamper guard (Hostess7 ZAC-style) + loopback HTTP panel ---
NEXUS_SEAL_VAULT=1
NEXUS_TAMPER_GUARD=1
NEXUS_TAMPER_AUTO_RESTORE=1

# --- ZNetwork field secure network (REVIEW_ONLY — probe/plan/status, no NM takeover) ---
NEXUS_ZNETWORK=1
NEXUS_ZNETWORK_PROMPT=1
# ZNETWORK_ROOT — set via env or sg_paths; sibling of SG_ROOT when present
# ZNETWORK_ROOT=
ZNETWORK_MODE=REVIEW_ONLY
NEXUS_AUDIO_TRAIN=1
NEXUS_HOME_PROTECTOR=1
NEXUS_SIGNALS_FIELD=1
NEXUS_FIELD_ANTENNA=1
NEXUS_FIELD_CATCH_MHZ=93.1
NEXUS_FIELD_TRI_CONCEPT=1
NEXUS_FIELD_TRI_MIN_CONF=0.25
NEXUS_FIELD_TRI_CEP_M=0.25
NEXUS_FIELD_ANTENNA_ROUNDS=12
NEXUS_FIELD_ANTENNA_MIN_SCORE=65
NEXUS_FIELD_RADIO=1
NEXUS_OPERATOR_DEFAULT=/usr/local/lib/nexus-shield/data/operator-default.json
NEXUS_I18N_DIR=/usr/local/lib/nexus-shield/data/i18n

# --- Field DNS — Truth resolver on loopback (RFC 1034/1035 trace, planetary EXTREME) ---
NEXUS_FIELD_DNS=1
NEXUS_FIELD_DNS_PORT=53
NEXUS_FIELD_DNS_ENFORCE_RESOLV=1
NEXUS_FIELD_DHCP=1
NEXUS_DNS_TAKEOVER_READY_CHECKS=2
NEXUS_FIELD_DNS_LOCAL_CAPTURE=1
