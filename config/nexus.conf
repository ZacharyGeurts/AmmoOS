# NEXUS-Shield runtime configuration — granular toggles, non-intrusive defaults.
# NEXUS-Shield: MIT License. AMOURANTHRTX field stack: GPL v3 or commercial (not MIT-free).
# Restart nexus-genius.service after changes.

# --- Ultra-stealth (AMOURANTHRTX field defaults; AMOURANTHRTX licensed separately) ---
NEXUS_ULTRA_STEALTH=1
NEXUS_CPU_QUOTA_PCT=5
NEXUS_SELF_DEFENSE=1
NEXUS_PREDICTIVE=1

# --- Module toggles (everyday profile: gatekeeper on, heavy watchers off) ---
NEXUS_SHADOW_WATCH=0
NEXUS_ENTROPY_WATCH=0
NEXUS_BEHAVIOR_WATCH=1
NEXUS_PRIVACY_GUARD=0

# --- Entropy ---
NEXUS_ENTROPY_SAMPLE=65536

# --- Adaptive polling (event-driven modules use inotify; these are fallback cadence) ---
NEXUS_BEHAVIOR_POLL_CALM=30
NEXUS_BEHAVIOR_POLL_ALERT=8
NEXUS_BEHAVIOR_POLL_STORM=2
NEXUS_PRIVACY_POLL_CALM=60
NEXUS_PRIVACY_POLL_ALERT=15
NEXUS_PRIVACY_POLL_STORM=5
NEXUS_VIGIL_MAINTAIN_INTERVAL=300

# --- Behavior scoring ---
NEXUS_BEHAVIOR_THRESHOLD_CALM=50

# --- Network lockdown (off for everyday users — enable if you run a file server) ---
NEXUS_NETWORK_LOCKDOWN=0
NEXUS_NETWORK_LOCKDOWN_PURGE=0

# --- Packet Oracle + Threat Panel (AMOURANTHRTX field DPI) ---
NEXUS_PACKET_ORACLE=1
NEXUS_CONNECTION_GATEKEEPER=1
NEXUS_THREAT_PANEL=1
NEXUS_THREAT_PANEL_PORT=9477
NEXUS_PANEL_AUTO_OPEN=1
NEXUS_ADBLOCK=0
NEXUS_PACKET_DPI_SAMPLE=24
NEXUS_PACKET_FIELD=1
NEXUS_PACKET_FIELD_CAPTURE=32
NEXUS_PACKET_FIELD_RING=400
NEXUS_H7_LIBRARY=1
NEXUS_PACKET_POLL_CALM=45
NEXUS_PACKET_POLL_ALERT=12
NEXUS_PACKET_POLL_STORM=3
NEXUS_FIELD_NOISE_RATIO=0.94
NEXUS_FIELD_TRUTH_RATIO=0.06

# --- First-run lockdown — block live public peers until operator trusts recommended connections ---
NEXUS_LOCKDOWN_FIRST=1

# --- v4.0 Packet Permission — DPI knows intent; block harmful sections only; good flows zero-cost nft permit ---
NEXUS_PACKET_PERMISSION=1
NEXUS_GATEKEEPER_STRICT_TRUST=1

# --- Kill detect — zero-overhead until harm signature changes; then block/eradicate/strike ---
NEXUS_KILL_DETECT=1

# --- Heaven / Hell — no friendly fire on Heaven; no mercy rip on Hell chosen ---
NEXUS_HEAVEN_HELL=1

# --- Paranoia mode (goal): OFF first → detect who/what → log ALL forensics → disable → re-enable from log ---
NEXUS_PARANOIA_MODE=1
NEXUS_PARANOIA_BLOCK=0

# --- Shutdown guard — scream bloody murder if killed; restart with block (recommended) or permissive ---
NEXUS_SHUTDOWN_GUARD=1
NEXUS_SHUTDOWN_DEFAULT_POLICY=block
NEXUS_HEARTBEAT_INTERVAL=15

# --- Autosanitize (off — use paranoia disable/reenable or gatekeeper Block) ---
NEXUS_AUTOSANITIZE=0

# --- Firewall Sentinel (NEXUS-owned nftables — good in, bad out) ---
NEXUS_FIREWALL=1
NEXUS_FIREWALL_TAKEOVER=1
NEXUS_FIREWALL_AUTO_BLOCK=0
NEXUS_FIREWALL_ALLOW_SSH=0
NEXUS_FIREWALL_BLOCK_DURATION=86400

# --- Seal vault + tamper guard (Hostess7 ZAC-style) + HTTPS panel ---
NEXUS_SEAL_VAULT=1
NEXUS_TAMPER_GUARD=1
NEXUS_TAMPER_AUTO_RESTORE=1
NEXUS_PANEL_TLS=1
NEXUS_AUDIO_TRAIN=1
NEXUS_HUMAN_REGISTRY=1
NEXUS_HOSTESS7_CORROBORATE=1
NEXUS_HOSTESS7_OPERATOR=1
NEXUS_HOSTESS7_AUTONOMOUS=1
HOSTESS7_ROOT=/home/default/Desktop/SG/Hostess7
HOSTESS7_TEAM_FIELD=/media/default/HOSTESS7_TEAM/fieldstorage
NEXUS_SHIELD_SOURCE=/home/default/Desktop/SG/Latest/NEXUS-Shield
NEXUS_TRUST_MEMORY_FILE=nexus-trusted.jsonl