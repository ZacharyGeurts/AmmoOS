NEXUS_FIELD_DNS_BINDS_IPV4=127.0.0.1,127.0.0.53
NEXUS_FIELD_DNS_BINDS_IPV6=::1
NEXUS_FIELD_DNS_CACHE_TTL=300

# --- Field Outside Talk — operator-initiated egress (SSH, telnet, mail, HTTP/S, custom ports) ---
NEXUS_FIELD_OUTSIDE_TALK=1

# --- Field Drive System — whole NEXUS on TEAM fieldstorage; talk via /field-talk (minimal browser) ---
NEXUS_FIELD_DRIVE=1

# --- Hostess 7 DNS Admin Portal — ports 7, 77, 777 (read-only; no remote controls) ---
NEXUS_DNS_ADMIN_PORTAL=1
NEXUS_DNS_ADMIN_PORTS=7,77,777
NEXUS_DNS_ADMIN_SESSION_TTL=28800
NEXUS_HEAVYBOI=1
NEXUS_HEAVYBOI_AUTOKILL=1
NEXUS_HUMAN_REGISTRY=1
NEXUS_HOSTESS7_CORROBORATE=1
NEXUS_HOSTESS7_OPERATOR=1
NEXUS_HOSTESS7_AUTONOMOUS=1
