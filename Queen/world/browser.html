<!DOCTYPE html>
<html lang="en" data-queen-theme="black_emerald_rose_2026">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Queen</title>
  <link rel="canonical" href="/world/browser.html" />
  <style>
    html,body{margin:0;background:#020403;color:#e8f2ea;font:14px system-ui,sans-serif}
  </style>
  <script src="queen-theme-2026.js" data-queen-theme="1"></script>
  <link rel="stylesheet" href="queen-modern.css" data-queen-theme="1" />
  <link rel="stylesheet" href="queen-world.css" data-queen-theme="1" />
  <link rel="stylesheet" href="queen-browser-shell.css" data-queen-theme="1" />
  <link rel="stylesheet" href="queen-branding.css" data-queen-theme="1" />
  <link rel="stylesheet" href="queen-field-plate.css" data-queen-theme="1" />
  <link rel="icon" href="assets/branding/amouranth-gentle.png" type="image/png" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http://127.0.0.1:* ws://127.0.0.1:*; frame-src 'self' http://127.0.0.1:* https:; object-src 'none'; base-uri 'self'; form-action 'self'" />
</head>
<body class="qw qw-browser-shell" data-queen-surface="browser" data-queen-theme="black_emerald_rose_2026" data-queen-start="http://127.0.0.1:9477/field" data-queen-command="http://127.0.0.1:9477/command" data-nexus-panel-port="9477" data-media-egress="locked" data-hardware-wire="queen-browser" data-front-hook="1">
  <div id="qm-threat-bar" class="qm-threat-bar" role="toolbar" aria-label="Root threats"></div>

  <main class="qb-viewport" id="qb-viewport">
    <div class="qb-field-plate" id="qb-field-plate" aria-hidden="true">
      <img class="qb-field-plate__portrait" src="assets/branding/amouranth-plate.png" alt="" width="1920" height="1080" loading="eager" />
      <div class="qb-field-plate__vignette" aria-hidden="true"></div>
      <div class="qb-field-plate__seal">
        <h1 class="qb-field-plate__name">Queen</h1>
        <p class="qb-field-plate__motto">Field web engine · plated · loopback held</p>
        <p class="qb-field-plate__rtx" id="qb-field-rtx">AMOURANTHRTX · wiring…</p>
        <p class="qb-field-plate__depth" id="qb-field-depth">Field depth · layer 0</p>
        <p class="qb-field-plate__sanity" id="qb-field-sanity">Integral · simplify layers · never build under heat</p>
      </div>
    </div>
    <iframe class="qb-frame" id="qb-frame" title="Field OS desktop" src="http://127.0.0.1:9477/field" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-presentation allow-popups-to-escape-sandbox"></iframe>
  </main>

  <header class="qb-chrome" id="qb-chrome" aria-label="Queen browser">
    <div class="qb-row qb-row--tabs">
      <div class="qb-tabs" id="qb-tabs" role="tablist"></div>
      <button type="button" class="qb-icon-btn" id="qb-new-tab" title="New tab (Ctrl+T)">+</button>
      <button type="button" class="qb-icon-btn qb-chrome-min-btn" id="qb-chrome-min" title="Minimize browser bar (_)" aria-label="Minimize browser bar" aria-pressed="false">_</button>
    </div>
    <div class="qb-row qb-row--nav">
      <button type="button" class="qb-icon-btn" id="qb-back" title="Back">←</button>
      <button type="button" class="qb-icon-btn" id="qb-forward" title="Forward">→</button>
      <button type="button" class="qb-icon-btn" id="qb-reload" title="Reload (Ctrl+R)">↻</button>
      <button type="button" class="qb-icon-btn qb-start-btn" id="qb-start" title="Start — field OS desktop">⊞</button>
      <button type="button" class="qb-icon-btn" id="qb-underlay-drop" title="Drop underlay beneath host desktop">⬇</button>
      <button type="button" class="qb-icon-btn" id="qb-underlay-rise" title="Rise field OS surface">⬆</button>
      <button type="button" class="qb-icon-btn" id="qb-fullscreen" title="Fullscreen (F11 · Alt+Enter)">⛶</button>
      <input type="url" class="qb-url" id="qb-url" placeholder="Search or enter address — gates held" spellcheck="false" />
      <button type="button" class="qb-btn qb-btn--go" id="qb-go">Go</button>
      <button type="button" class="qb-compat-pill" id="qb-compat-pill" title="Web compat — auto secures legacy">auto</button>
      <button type="button" class="qb-gate-pill" id="qb-gate-pill" title="Queen gate verdict">…</button>
      <button type="button" class="qb-icon-btn" id="qb-proxy" title="Queen proxy fallback">⎋</button>
      <button type="button" class="qb-icon-btn" id="qb-gates" title="Gate manifest">◇</button>
    </div>
    <div class="qb-row qb-row--humans-ai" aria-label="Humans and AI local assist">
      <div class="qb-humans-ai" id="qb-humans-ai">
        <span class="qb-ha-who qb-ha-who--human" id="qb-ha-who" title="Human operator — you hold authority">Human</span>
        <span class="qb-ha-tip" id="qb-ha-tip" title="Local IT guidance — no cloud">Loading local assist…</span>
        <span class="qb-ha-vector" id="qb-ha-vector" aria-label="Contact vector"></span>
        <button type="button" class="qb-ha-help" id="qb-ha-help" title="Open gate manifest — see how Humans &amp; AI share the field">◇</button>
      </div>
    </div>
    <div class="qb-row qb-row--bookmarks">
      <nav class="qb-bookmarks" id="qb-bookmarks" aria-label="Bookmarks"></nav>
      <span class="qb-brand-strip">
        <img class="qb-brand-avatar" src="assets/branding/amouranth-gentle.png" alt="" width="28" height="28" />
        <span>Queen</span>
      </span>
      <span class="qb-security-strip" id="qb-security-strip" title="AMOURANTHRTX zero-cost 4-slot · Queen jail">4-slot · 0% tax</span>
      <div class="qb-import-chip" id="qb-import-chip" title="Secure import — click to re-sweep · Shift+click = default browser">
        <span class="qb-import-label">IMPORT</span>
        <span class="qb-import-detail" id="qb-import-detail">Securing…</span>
      </div>
      <div class="qb-update-chip" title="NXF GitHub release update when online">
        <button type="button" class="qb-update-btn" id="qb-update-btn">…</button>
        <span class="qb-update-detail" id="qb-update-detail">Checking…</span>
      </div>
      <div class="qb-gate-strip" id="qb-gate-strip"></div>
    </div>
    <p class="qb-status" id="qb-status" aria-live="polite"></p>
  </header>

  <aside class="qb-gate-drawer" id="qb-gate-drawer">
    <h2>Gates · hold all</h2>
    <div id="qb-gate-drawer-body"></div>
  </aside>

  <button type="button" class="qb-chrome-restore" id="qb-chrome-restore" hidden
    title="Restore Queen browser bar — hover to peek · click to expand"
    aria-label="Restore browser bar">
    <img src="assets/branding/queen-chrome-restore.svg" width="16" height="16" alt="" />
  </button>

  <script src="queen-media-egress.js" data-queen-theme="1"></script>
  <script src="queen-root-threats.js" defer></script>
  <script src="queen-branding.js" defer></script>
  <script src="queen-humans-ai.js" defer></script>
  <script src="queen-browser-shell.js" defer></script>
  <script src="queen-chrome-dock.js" defer></script>
  <script src="queen-field-engine.js" defer></script>
  <script src="queen-field-sanity.js" defer></script>
  <script src="queen-update.js" defer></script>
  <script src="queen-import.js" defer></script>
  <script src="queen-os.js" defer></script>
</body>
</html>
