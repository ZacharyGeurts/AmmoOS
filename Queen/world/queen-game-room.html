<!DOCTYPE html>
<html lang="en" data-queen-theme="black_emerald_rose_2026">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Queen Game Room · CHIPS</title>
  <link rel="stylesheet" href="queen-modern.css" data-queen-theme="1" />
  <link rel="stylesheet" href="queen-world.css" data-queen-theme="1" />
  <link rel="stylesheet" href="queen-styles.css" />
  <script src="queen-styles.js" data-queen-theme="1"></script>
  <link rel="icon" href="assets/branding/queen-favicon-48.png" type="image/png" sizes="48x48" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http://127.0.0.1:*; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'" />
</head>
<body class="queen-game-room-page qw" data-queen-surface="gameroom">
  <header class="gr-hero">
    <div class="gr-hero-inner">
      <p class="gr-eyebrow">CHIPS · Grok16 field_opt · Queen Webbrowser</p>
      <h1 class="gr-title" id="gr-stage-title">Game Room</h1>
      <p class="gr-sub" id="gr-mode-label">Pick a system — web canvas · no desktop comp shader</p>
      <div class="gr-status" id="gr-status"></div>
    </div>
    <div class="gr-hero-actions">
      <button type="button" class="gr-btn gr-btn--gold" id="gr-launch">Launch</button>
      <button type="button" class="gr-btn" id="gr-fullscreen" title="Fullscreen (F)">⛶</button>
      <button type="button" class="gr-btn" id="gr-styles" data-queen-styles-open title="Styles" aria-label="Styles">◈</button>
      <button type="button" class="gr-btn" id="gr-refresh">↻</button>
      <label class="gr-btn gr-btn--file">
        Movie<input type="file" id="gr-movie-input" accept="video/*,.mkv,.avi,.mov,.mp4,.webm,.m4v,.mpg,.mpeg,.m3u8" hidden />
      </label>
    </div>
  </header>
  <main class="gr-stage" id="gr-stage" aria-label="Queen Game Room theater">
    <div class="gr-curtain gr-curtain--left" id="gr-curtain-l" aria-hidden="true"></div>
    <div class="gr-curtain gr-curtain--right" id="gr-curtain-r" aria-hidden="true"></div>
    <div class="gr-screen-wrap" id="gr-screen-wrap">
      <canvas class="gr-canvas" id="gr-canvas" width="640" height="480" aria-label="CHIPS emulator viewport"></canvas>
      <video class="gr-video" id="gr-video" controls playsinline hidden></video>
      <div class="gr-screen-glow" aria-hidden="true"></div>
      <div class="gr-screen-hud" id="gr-hud" hidden></div>
    </div>
  </main>
  <div class="gr-deck">
    <aside class="gr-sidebar">
      <h3>Computer · all systems</h3>
      <div class="gr-tiles" id="gr-systems"></div>
      <div class="gr-controls">
        <label class="gr-field">
          <span>Host CPU</span>
          <select class="gr-select" id="gr-cpus" aria-label="Host CPU"></select>
        </label>
        <label class="gr-field">
          <span>Memory</span>
          <select class="gr-select" id="gr-memory" aria-label="Memory profile"></select>
        </label>
        <label class="gr-field">
          <span>Screen ratio</span>
          <select class="gr-select" id="gr-aspect" aria-label="Aspect ratio">
            <option value="16/9">16:9 widescreen</option>
            <option value="4/3">4:3 retro</option>
            <option value="2.39/1">2.39:1 cinema</option>
            <option value="10/9">10:9 handheld</option>
          </select>
        </label>
      </div>
    </aside>
    <pre class="gr-log" id="gr-log"></pre>
  </div>
  <script src="queen-game-room.js" defer></script>
</body>
</html>
